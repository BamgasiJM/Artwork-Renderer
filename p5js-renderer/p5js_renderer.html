<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <title>p5 PNG Renderer</title>

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #111;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 16px;
      }

      canvas {
        border: 1px solid #333;
      }

      #controls {
        display: flex;
        gap: 10px;
      }

      button {
        padding: 10px 16px;
        font-size: 14px;
        background: #222;
        color: #eee;
        border: 1px solid #444;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      button:not(:disabled):hover {
        background: #333;
      }

      #status {
        color: #888;
        font-size: 13px;
        font-family: monospace;
      }
    </style>
  </head>

  <body>
    <div id="canvas-holder"></div>

    <div id="controls">
      <button id="startBtn">아트워크 시작 및 녹화</button>
      <button id="stopBtn" disabled>정지 - 압축파일 생성</button>
    </div>

    <div id="status">대기 중</div>

    <script src="https://cdn.jsdelivr.net/npm/p5@latest/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

    <script>
      window.RENDER = {
        width: 512,
        height: 512,
        fps: 30,
        duration: 10, // TOTAL_FRAMES 도달 시 자동 종료. 무제한으로 두려면 renderer.js의 TOTAL_FRAMES 체크를 참고
      };
    </script>

    <script src="./src/renderer.js"></script>
    <script src="./src/artwork_02.js"></script>
  </body>
</html>
